<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stopwatch</title>
    <style>
      :root {
        --bg: #333333;
        --text: #ffffff;
        --fontSize: 15vw;
        --msOpacity: 1;
        --fontFamily:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
      }

      input::-webkit-outer-spin-button,
      input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      #main {
        background-color: var(--bg);
      }

      .timer {
        color: var(--text);
        font-size: var(--fontSize);
        line-height: 1;
        text-align: center;
        font-weight: 800;
        letter-spacing: 0.02em;
        font-family: var(--fontFamily);
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }
      .timer .ms {
        font-size: 0.6em;
        opacity: var(--msOpacity);
      }
    </style>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body class="bg-neutral flex h-dvh flex-col overflow-hidden">
    <div id="titlebar" class="titlebar"></div>
    <div class="m-auto w-full flex min-h-0 grow overflow-y-auto">
      <div
        id="main"
        class="relative flex flex-1 w-full justify-center items-center"
      >
        <!-- main content -->
        <div id="timer" class="timer">
          <div id="ms"></div>
        </div>
      </div>
    </div>
    <script src="./renderer.js"></script>
  </body>
</html>
